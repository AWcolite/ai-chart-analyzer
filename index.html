<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chart Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:linear-gradient(135deg,#6b5b95,#feb236,#d64161);
  background-size:200% 200%;
  animation:bg 8s ease infinite;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}
@keyframes bg{
0%,100%{background-size:200%}
50%{background-size:210%}
}
.spinner{
border:4px solid rgba(255,255,255,.2);
border-top-color:white;
border-radius:50%;
width:40px;height:40px;
animation:spin 1s linear infinite;
margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="w-full max-w-3xl p-8 bg-gray-900/80 rounded-3xl text-center">

<h1 class="text-4xl font-bold mb-4 text-yellow-400">
AI Chart Analyzer
</h1>

<p class="text-gray-300 mb-6">
AI analyzes your trading chart and suggests TP & SL instantly.
</p>

<!-- LOGIN -->
<div id="loginBox" class="mb-6">
<input id="emailInput" type="email"
placeholder="Enter your email to continue"
class="w-full p-3 rounded-xl text-black mb-3">

<button id="loginBtn"
class="w-full bg-blue-500 hover:bg-blue-600 py-2 rounded-xl font-bold">
Continue
</button>
</div>

<p id="welcomeText" class="hidden text-green-400 mb-4"></p>

<!-- Upload -->
<label class="border-2 border-dashed border-gray-600 rounded-2xl p-6 cursor-pointer block">
Click to upload chart screenshot
<input id="chartUpload" type="file" accept="image/*" class="hidden">
</label>

<div id="previewContainer" class="mt-4 hidden">
<img id="previewImg" class="w-64 h-40 mx-auto rounded-xl">
</div>

<button id="analyzeBtn"
class="mt-6 w-full bg-yellow-500 text-black py-3 rounded-xl font-bold">
Analyze
</button>

<div id="loading" class="mt-6 hidden">
<div class="spinner"></div>
<p class="mt-2">AI detecting trend structure...</p>
</div>

<div class="mt-8 grid grid-cols-2 gap-6">
<div class="bg-green-500 rounded-3xl p-6">
<p>Take Profit</p>
<p id="tp" class="text-4xl font-bold">0.000</p>
</div>

<div class="bg-red-500 rounded-3xl p-6">
<p>Stop Loss</p>
<p id="sl" class="text-4xl font-bold">0.000</p>
</div>
</div>

<p class="text-xs text-gray-400 mt-8">
Educational purposes only. Not financial advice.
</p>

</div>

<script>

// ===== LOGIN SYSTEM =====
const loginBox = document.getElementById("loginBox");
const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("emailInput");
const welcomeText = document.getElementById("welcomeText");

const savedUser = localStorage.getItem("userEmail");

if(savedUser){
loginBox.style.display="none";
welcomeText.classList.remove("hidden");
welcomeText.textContent="Welcome back, "+savedUser;
}

loginBtn.addEventListener("click",()=>{
const email=emailInput.value;

if(!email){
alert("Please enter email");
return;
}

localStorage.setItem("userEmail",email);

loginBox.style.display="none";
welcomeText.classList.remove("hidden");
welcomeText.textContent="Welcome, "+email;
});

// ===== Upload Preview =====
const uploadInput=document.getElementById("chartUpload");
const previewImg=document.getElementById("previewImg");
const previewContainer=document.getElementById("previewContainer");

let uploadedFile=null;

uploadInput.addEventListener("change",(e)=>{
uploadedFile=e.target.files[0];

const reader=new FileReader();
reader.onload=(ev)=>{
previewImg.src=ev.target.result;
previewContainer.classList.remove("hidden");
};
reader.readAsDataURL(uploadedFile);
});

// ===== Analyze =====
const analyzeBtn=document.getElementById("analyzeBtn");
const loading=document.getElementById("loading");
const tp=document.getElementById("tp");
const sl=document.getElementById("sl");

analyzeBtn.addEventListener("click",async()=>{

// 🔒 LOGIN LOCK
if(!localStorage.getItem("userEmail")){
alert("Please login first!");
return;
}

if(!uploadedFile){
alert("Upload chart first!");
return;
}

loading.classList.remove("hidden");

await new Promise(r=>setTimeout(r,2000));

// fake AI result
tp.textContent=(Math.random()*0.05+1.1).toFixed(3);
sl.textContent=(Math.random()*0.05+1.0).toFixed(3);

loading.classList.add("hidden");
});

</script>

</body>
</html>
