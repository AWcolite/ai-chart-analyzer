<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chart Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: linear-gradient(135deg, #6b5b95, #feb236, #d64161);
      background-size: 200% 200%;
      animation: bg-breathe 8s ease-in-out infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      color: white;
    }
    @keyframes bg-breathe {
      0%,100% { background-size: 200% 200%; }
      50% { background-size: 210% 210%; }
    }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 10px 2px rgba(255,255,255,0.2); }
      50% { box-shadow: 0 0 20px 6px rgba(255,255,255,0.5); }
    }
    .glow { animation: pulse-glow 0.8s ease-in-out 2; }
    @keyframes spin { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
    .spinner { border:4px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:auto;}
  </style>
</head>
<body>

  <div class="w-full max-w-3xl p-8 bg-gray-900/80 rounded-3xl shadow-2xl text-center">
    <h1 class="text-4xl font-bold mb-6 text-yellow-400">AI Chart Analyzer</h1>

    <!-- 上传 -->
    <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-600 rounded-2xl p-6 cursor-pointer hover:border-yellow-400 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 0L8 8m4-4l4 4" />
      </svg>
      <span class="text-gray-300 font-medium">Click to upload chart screenshot</span>
      <input id="chartUpload" type="file" accept="image/*" class="hidden">
    </label>

    <!-- 上传预览 -->
    <div id="previewContainer" class="mt-4 hidden">
      <img id="previewImg" class="w-64 h-40 object-contain rounded-xl shadow-lg mx-auto" src="" alt="Preview">
    </div>

    <!-- 分析按钮 -->
    <button id="analyzeBtn" class="mt-6 w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black py-3 rounded-xl font-bold shadow-lg hover:scale-105 transform transition-all duration-200">
      Analyze
    </button>

    <!-- 分析加载动画 -->
    <div id="loading" class="mt-6 hidden">
      <div class="spinner"></div>
      <p class="mt-2 text-gray-200">Analyzing chart...</p>
    </div>

    <!-- TP / SL 卡片 -->
    <div class="mt-8 grid grid-cols-2 gap-6">
      <!-- TP -->
      <div id="tpCard" class="bg-green-500 rounded-3xl p-6 shadow-xl flex flex-col items-center justify-center relative overflow-hidden">
        <span class="absolute top-0 right-0 m-3 text-white/70 text-sm font-medium">Take Profit</span>
        <span id="tp" class="text-5xl font-extrabold text-white mt-2">0.000</span>
        <span id="tpPercent" class="mt-2 text-white/80 text-lg opacity-0">+0.0%</span>
        <span id="tpArrow" class="mt-1 text-white text-2xl opacity-0">↑</span>
      </div>

      <!-- SL -->
      <div id="slCard" class="bg-red-500 rounded-3xl p-6 shadow-xl flex flex-col items-center justify-center relative overflow-hidden">
        <span class="absolute top-0 right-0 m-3 text-white/70 text-sm font-medium">Stop Loss</span>
        <span id="sl" class="text-5xl font-extrabold text-white mt-2">0.000</span>
        <span id="slPercent" class="mt-2 text-white/80 text-lg opacity-0">-0.0%</span>
        <span id="slArrow" class="mt-1 text-white text-2xl opacity-0">↓</span>
      </div>
    </div>
  </div>

  <script>
    const uploadInput = document.getElementById('chartUpload');
    const previewContainer = document.getElementById('previewContainer');
    const previewImg = document.getElementById('previewImg');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');

    const tpDisplay = document.getElementById('tp');
    const slDisplay = document.getElementById('sl');
    const tpCard = document.getElementById('tpCard');
    const slCard = document.getElementById('slCard');

    const tpPercent = document.getElementById('tpPercent');
    const slPercent = document.getElementById('slPercent');
    const tpArrow = document.getElementById('tpArrow');
    const slArrow = document.getElementById('slArrow');

    let uploadedFile = null;

    uploadInput.addEventListener('change', (event) => {
      uploadedFile = event.target.files[0];
      if (uploadedFile) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          previewContainer.classList.remove("hidden");
        }
        reader.readAsDataURL(uploadedFile);
        alert("Screenshot uploaded: " + uploadedFile.name);
      }
    });

    function animateNumber(element, target) {
      const duration = 1000;
      const frameRate = 30;
      let frame = 0;
      const totalFrames = Math.round(duration / (1000 / frameRate));
      const start = 0;
      const diff = target - start;
      const interval = setInterval(() => {
        frame++;
        const progress = frame / totalFrames;
        const value = (start + diff * progress).toFixed(3);
        element.textContent = value;
        if(frame>=totalFrames) clearInterval(interval);
      }, 1000/frameRate);
    }

    analyzeBtn.addEventListener('click', async () => {
      if(!uploadedFile){ alert('Please upload a chart screenshot first!'); return; }

      tpDisplay.textContent = "0.000";
      slDisplay.textContent = "0.000";
      tpPercent.style.opacity = "0";
      slPercent.style.opacity = "0";
      tpArrow.style.opacity = "0";
      slArrow.style.opacity = "0";

      loading.classList.remove("hidden");

      tpCard.classList.remove("glow");
      slCard.classList.remove("glow");
      void tpCard.offsetWidth; void slCard.offsetWidth;

      await new Promise(res=>setTimeout(res,2000));

      const simulatedTP = (Math.random()*0.05+1.1).toFixed(3);
      const simulatedSL = (Math.random()*0.05+1.0).toFixed(3);

      const tpPercentVal = ((Math.random()*5)+1).toFixed(1);
      const slPercentVal = ((Math.random()*3)+0.5).toFixed(1);

      animateNumber(tpDisplay, parseFloat(simulatedTP));
      animateNumber(slDisplay, parseFloat(simulatedSL));

      tpPercent.textContent = `+${tpPercentVal}%`;
      slPercent.textContent = `-${slPercentVal}%`;
      tpArrow.style.opacity = "1";
      slArrow.style.opacity = "1";
      tpPercent.style.opacity = "1";
      slPercent.style.opacity = "1";

      tpCard.classList.add("glow");
      slCard.classList.add("glow");

      loading.classList.add("hidden");
    });
  </script>
</body>
</html>
